name: Maven Build and Docker Push

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Java (for Maven build)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. Build Maven project
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 4. Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: harshithabuchupalli
          password: Sweety@2026

      # 5. Build Docker image
      - name: Build Docker image
        run: |
          docker build -t harshithabuchupalli/myapp:${{ github.sha }} .
          docker tag harshithabuchupalli/myapp:${{ github.sha }} \
                     harshithabuchupalli/myapp:latest

      # 6. Push Docker image
      - name: Push Docker image
        run: |
          docker push harshithabuchupalli/myapp:${{ github.sha }}
          docker push harshithabuchupalli/myapp:latest
          
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Updating Kubernetes deployment..."

            export KUBECONFIG=/home/ubuntu/.kube/config

            kubectl set image deployment/myfirstapp \
              myfirstapp=harshithabuchupalli/myapp:latest

            kubectl rollout status deployment/myfirstapp
